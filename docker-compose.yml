version: '3.9'

services:
  backend:
    build:
      context: ./camping-main
      dockerfile: Dockerfile
    container_name: familycamp-backend
    env_file:
      - ./camping-main/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: familycamp-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
