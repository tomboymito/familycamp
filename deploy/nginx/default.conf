server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index aye.html;

    location = / {
        try_files /aye.html =404;
    }

    location / {
        try_files $uri $uri/ /aye.html;
    }

    location ~ ^/(bookings|availability|accommodation-types|guests|reviews|health|docs|redoc)$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(bookings|availability|accommodation-types|guests|reviews)/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
