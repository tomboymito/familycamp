<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FamilyCamp Admin</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;margin:0;background:#f5f6f8;color:#1f2937}
    .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
    aside{background:#fff;border-right:1px solid #e5e7eb;padding:20px}
    main{padding:20px}
    .menu a{display:block;padding:10px 12px;color:#111827;text-decoration:none;border-radius:8px}
    .menu a.active{background:#eef2ff;color:#4338ca}
    .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    .board{overflow:auto;background:#fff;border:1px solid #e5e7eb;border-radius:12px}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #e5e7eb;padding:8px;min-width:110px;text-align:center}
    th:first-child, td:first-child{position:sticky;left:0;background:#fff;z-index:1;text-align:left;min-width:180px}
    .free{background:#dcfce7}.busy{background:#fecaca}.blocked{background:#e5e7eb}
  </style>
</head>
<body>
<div class="layout">
  <aside>
    <h3>Админка</h3>
    <nav class="menu">
      <a class="active" href="#">Шахматка</a>
      <a href="#">Брони</a>
      <a href="#">Настройки</a>
    </nav>
  </aside>
  <main>
    <div class="toolbar">
      <button id="todayBtn">Сегодня</button>
      <input type="date" id="fromDate" />
      <input type="date" id="toDate" />
      <input type="text" id="phoneSearch" placeholder="Поиск по телефону" />
      <button id="loadBtn">Обновить</button>
    </div>
    <div class="board"><table id="board"></table></div>
  </main>
</div>
<script>
  const spots=[{id:1,name:'Палаточное место'},{id:2,name:'Семейный домик'},{id:3,name:'Домик у озера'}];
  const board=document.getElementById('board');
  const fromInput=document.getElementById('fromDate');
  const toInput=document.getElementById('toDate');
  const start=new Date();
  const end=new Date();end.setDate(start.getDate()+6);
  fromInput.valueAsDate=start;toInput.valueAsDate=end;

  function formatDate(d){return d.toISOString().slice(0,10)}
  function daysBetween(startDate,endDate){const days=[];for(let d=new Date(startDate);d<=endDate;d.setDate(d.getDate()+1)){days.push(new Date(d));}return days;}

  async function load(){
    const from=fromInput.value,to=toInput.value,phone=document.getElementById('phoneSearch').value.trim();
    const query=new URLSearchParams({from_date:from,to_date:to});
    if(phone)query.set('customer_phone',phone);
    const auth='Basic '+btoa(prompt('Логин','admin')+':'+prompt('Пароль','admin123'));
    const res=await fetch(`/admin/bookings?${query.toString()}`,{headers:{Authorization:auth}});
    const bookings=res.ok?await res.json():[];
    render(bookings,new Date(from),new Date(to));
  }

  function render(bookings,from,to){
    const days=daysBetween(from,to);
    board.innerHTML='';
    const head=document.createElement('tr');head.innerHTML='<th>Место</th>'+days.map(d=>`<th>${formatDate(d)}</th>`).join('');board.appendChild(head);
    spots.forEach(spot=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${spot.name}</td>`+days.map(day=>{
        const ds=formatDate(day);
        const busy=bookings.find(b=>b.spot_id===spot.id && b.check_in<ds && b.check_out>ds || b.check_in===ds);
        const cls=busy?'busy':'free';
        return `<td class="${cls}">${busy?`#${busy.id}`:'Свободно'}</td>`;
      }).join('');
      board.appendChild(tr);
    });
  }

  document.getElementById('todayBtn').onclick=()=>{const s=new Date();const e=new Date();e.setDate(s.getDate()+6);fromInput.valueAsDate=s;toInput.valueAsDate=e;load();};
  document.getElementById('loadBtn').onclick=load;
  load();
</script>
</body>
</html>
